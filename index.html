<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiAkun — Expense Analytics Integrated</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
body{font-family:Arial;background:#f5f7fb;margin:0}
.container{padding:20px}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.exp-filter-bar{display:flex;gap:10px;margin-bottom:15px}
.chart-toggle button{padding:6px 10px;border:none;cursor:pointer}
.chart-toggle .active{background:#2563eb;color:#fff}
.exp-ranking-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0}
</style>
</head>
<body>
<div class="container">

<div class="card">
<h2>📊 Expense Analytics</h2>

<div class="exp-filter-bar">
<select id="month"></select>
<select id="year"></select>
<div class="chart-toggle">
<button id="pieBtn" class="active" onclick="setType('pie')">Pie</button>
<button id="donutBtn" onclick="setType('doughnut')">Donut</button>
</div>
</div>

<canvas id="chart" height="120"></canvas>

<div id="insight" style="margin-top:10px"></div>
<div id="ranking"></div>

</div>
</div>

<script>

// ===== DATA (SIMULASI / GANTI DARI DB kamu) =====
let DB = {
transactions:[
{date:'2026-05-01',entries:[{acc:'Operasional',deb:11922190}]},
{date:'2026-05-02',entries:[{acc:'Salary',deb:11400000}]},
{date:'2026-05-03',entries:[{acc:'ATK',deb:4054125}]},
{date:'2026-05-04',entries:[{acc:'Marketing',deb:402825}]},
{date:'2026-05-05',entries:[{acc:'Lainnya',deb:109729}]},
{date:'2026-05-06',entries:[{acc:'Transport',deb:1200000}]},
{date:'2026-05-07',entries:[{acc:'Internet',deb:800000}]},
]
}

// ===== UTIL =====
function rupiah(v){return 'Rp '+v.toLocaleString('id-ID')}

let chart, type='pie'

function getData(){
  const m=document.getElementById('month').value
  const y=document.getElementById('year').value

  return DB.transactions.filter(t=>{
    const d=new Date(t.date)
    return (!m || d.getMonth()+1==m) && (!y || d.getFullYear()==y)
  })
}

function aggregate(){
  const data=getData()
  let map={}

  data.forEach(t=>{
    t.entries.forEach(e=>{
      if(!map[e.acc]) map[e.acc]=0
      map[e.acc]+=e.deb
    })
  })

  return map
}

function render(){
  const agg=aggregate()
  const labels=Object.keys(agg)
  const values=Object.values(agg)
  const total=values.reduce((a,b)=>a+b,0)

  if(chart) chart.destroy()

  chart=new Chart(document.getElementById('chart'),{
    type:type,
    data:{labels,datasets:[{data:values}]},
    options:{
      plugins:{
        tooltip:{callbacks:{
          label:(c)=>{
            let pct=((c.raw/total)*100).toFixed(1)
            return `${c.label}: ${rupiah(c.raw)} (${pct}%)`
          }
        }}
      }
    }
  })

  // insight
  let sorted=Object.entries(agg).sort((a,b)=>b[1]-a[1])
  if(sorted.length){
    let top=sorted[0]
    let pct=((top[1]/total)*100).toFixed(1)
    document.getElementById('insight').innerHTML=
      `💡 ${top[0]} mendominasi ${pct}% (${rupiah(top[1])})`
  }

  // ranking
  let html=''
  sorted.forEach((d,i)=>{
    let pct=((d[1]/total)*100).toFixed(1)
    html+=`<div class='exp-ranking-row'>
      <div>${i+1}. ${d[0]}</div>
      <div>${rupiah(d[1])} (${pct}%)</div>
    </div>`
  })

  document.getElementById('ranking').innerHTML=html
}

function setType(t){
  type=t
  pieBtn.classList.remove('active')
  donutBtn.classList.remove('active')
  if(t==='pie') pieBtn.classList.add('active')
  else donutBtn.classList.add('active')
  render()
}

function init(){
  let m=document.getElementById('month')
  let y=document.getElementById('year')

  m.innerHTML='<option value="">All Month</option>'
  for(let i=1;i<=12;i++) m.innerHTML+=`<option>${i}</option>`

  y.innerHTML='<option value="">All Year</option>'
  y.innerHTML+='<option>2026</option>'

  m.onchange=render
  y.onchange=render

  render()
}

init()

</script>
</body>
</html>
